version: 2
updates:
  # NuGet versions live in Directory.Packages.props (Central Package Management).
  - package-ecosystem: "nuget"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    # Scoped Commits (scope-first, see CONTRIBUTING.md), not the conventional-commits default.
    commit-message:
      prefix: "deps"
    groups:
      analyzers:
        patterns:
          - "*.Analyzer*"
          - "StyleCop.*"
          - "SonarAnalyzer.*"
          - "Roslynator.*"
          - "Meziantou.*"
      opentelemetry:
        patterns:
          - "OpenTelemetry.*"
          - "Azure.Monitor.OpenTelemetry.*"
    ignore:
      # MassTransit is pinned to v8 by policy (v9 requires a commercial license); enforced by a
      # fitness test. Don't let Dependabot propose the major bump. See Directory.Packages.props.
      - dependency-name: "MassTransit*"
        update-types: ["version-update:semver-major"]
      # ImageSharp is pinned to v3 by policy (v4 requires a commercial license key at BUILD time;
      # its MSBuild targets fail without one); enforced by the same fitness test. See
      # Directory.Packages.props.
      - dependency-name: "SixLabors.ImageSharp"
        update-types: ["version-update:semver-major"]
      # VS.Threading.Analyzers v18 adds stricter rules (e.g. VSTHRD103) that error under
      # TreatWarningsAsErrors; held at v17 until the flagged call sites are reworked.
      - dependency-name: "Microsoft.VisualStudio.Threading.Analyzers"
        update-types: ["version-update:semver-major"]
      # Breaking majors held back deliberately. MessagePack is also pinned to a patched 2.x to
      # override a vulnerable transitive (see Directory.Packages.props).
      - dependency-name: "StackExchange.Redis"
        update-types: ["version-update:semver-major"]
      - dependency-name: "MessagePack"
        update-types: ["version-update:semver-major"]

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "ci"
