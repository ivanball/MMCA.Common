name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0 # MinVer needs full history

      - uses: actions/setup-dotnet@v6
        with:
          dotnet-version: '10.0.x'

      # Fast, dependency-free drift gate: FACTS.md must match what `build/facts` computes from source
      # (version from the git tag, package count, ADR range, fitness-method/base counts). Fails the
      # build if the committed FACTS.md is stale — regenerate with `dotnet run --project build/facts -- .`.
      - name: Verify FACTS.md is current
        run: dotnet run --project build/facts -- . --check

      - name: Restore
        run: dotnet restore MMCA.Common.slnx

      - name: Build
        run: dotnet build MMCA.Common.slnx -c Release --no-restore

      - name: Audit dependencies (fail on known vulnerabilities)
        run: |
          dotnet list MMCA.Common.slnx package --vulnerable --include-transitive > audit.log 2>&1 || true
          cat audit.log
          # `dotnet list --vulnerable` ignores NuGetAuditSuppress, so honor the same accepted-advisory
          # list here (single source of truth: Directory.Build.props). Fail only on a vulnerable-package
          # row (">") whose advisory is NOT suppressed — e.g. the unpatched SQLite advisory is accepted.
          # Scoped to actual <NuGetAuditSuppress> lines: a GHSA id mentioned in a comment about a
          # NON-accepted advisory must not silently suppress it here.
          suppressed=$(grep -E '<NuGetAuditSuppress\b' Directory.Build.props | grep -oE 'GHSA-[a-z0-9-]+' | sort -u | paste -sd'|' -)
          echo "Accepted (suppressed) advisories: ${suppressed:-<none>}"
          vulns=$(grep -E '^[[:space:]]*>[[:space:]]' audit.log || true)
          if [ -n "$suppressed" ]; then
            vulns=$(printf '%s\n' "$vulns" | grep -vE "$suppressed" || true)
          fi
          if printf '%s' "$vulns" | grep -q .; then
            echo "::error::Non-suppressed vulnerable NuGet packages detected — see log above"; exit 1
          fi
          echo "No non-suppressed vulnerable packages."

      - name: Install coverage tool
        run: dotnet tool install --global dotnet-coverage

      - name: Test (with coverage)
        # dotnet-coverage wraps the MTP run and emits cobertura; it returns the test exit code so a
        # test failure still gates. Coverage is report-only (see the `coverage` job).
        run: |
          export PATH="$PATH:$HOME/.dotnet/tools"
          # Floor at 2000 (suite is ~2,254): a discovery/filter regression that silently drops
          # thousands of tests must fail the job, not pass green with a handful discovered.
          dotnet-coverage collect -f cobertura -o coverage.unit.cobertura.xml \
            "dotnet test --solution MMCA.Common.slnx -c Release --no-build --minimum-expected-tests 2000"

      - name: Upload coverage (unit + architecture + bUnit)
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: coverage-unit
          path: coverage.unit.cobertura.xml
          if-no-files-found: warn

  # The MAUI multi-target package (MMCA.Common.UI.Maui) cannot build on ubuntu — its four TFMs
  # (android/ios/maccatalyst/windows) need the MAUI workloads — so it builds in its own
  # windows job and stays OUT of MMCA.Common.slnx, the same mechanism that keeps the gallery
  # and UI E2E projects out of the unit run. Required merge gate alongside build-and-test.
  # (No tests here: the capability contracts and fallbacks are covered in MMCA.Common.UI.Tests
  # on ubuntu; the MAUI implementations are thin Essentials wrappers exercised on-device.)
  build-maui:
    name: Build MMCA.Common.UI.Maui (windows, 4 TFMs)
    runs-on: windows-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0 # MinVer needs full history

      - uses: actions/setup-dotnet@v6
        with:
          dotnet-version: '10.0.x'

      - name: Install MAUI workload
        run: dotnet workload install maui

      - name: Build (android + ios + maccatalyst + windows)
        run: dotnet build Source/Presentation/MMCA.Common.UI.Maui/MMCA.Common.UI.Maui.csproj -c Release

  # Real-browser axe (WCAG 2.1 AA) + render-smoke gate for the shared MMCA.Common.UI. A backend-less
  # gallery host (Tests/Presentation/MMCA.Common.UI.Gallery) renders the real Login/Register pages and a
  # primitives showcase; MMCA.Common.UI.E2E.Tests self-hosts it in-process and scans it with Playwright.
  # Kept in its own job (browser install + headed-ish run) and OUT of MMCA.Common.slnx so the unit
  # `dotnet test --solution` above stays fast.
  ui-e2e:
    name: UI a11y + render smoke (${{ matrix.browser }})
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      # Don't let one engine's failure cancel the others; surface each engine's result independently.
      fail-fast: false
      matrix:
        browser: [chromium, firefox, webkit]
    # All three engines are required merge gates (§22): firefox promoted 2026-07-12 after a clean
    # observed streak, webkit promoted 2026-07-16 after 11 consecutive green main runs since its
    # last flake (2026-07-12 00:45). Add the webkit check to branch protection alongside the others.
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0 # MinVer needs full history

      - uses: actions/setup-dotnet@v6
        with:
          dotnet-version: '10.0.x'

      - name: Build UI E2E project
        # The gallery + E2E projects are intentionally outside the .slnx, so build this graph directly
        # (restore included). They reference MMCA.Common source projects — no GitHub Packages token needed.
        run: dotnet build Tests/Presentation/MMCA.Common.UI.E2E.Tests/MMCA.Common.UI.E2E.Tests.csproj -c Release

      - name: Install Playwright (${{ matrix.browser }})
        run: |
          script=$(find Tests/Presentation/MMCA.Common.UI.E2E.Tests/bin/Release -name playwright.ps1 | head -1)
          pwsh "$script" install --with-deps ${{ matrix.browser }}

      - name: Install coverage tool
        if: matrix.browser == 'chromium'
        run: dotnet tool install --global dotnet-coverage

      - name: Run UI E2E (axe + render smoke)
        # Collect coverage on the canonical chromium leg only (report-only); other engines run plain.
        env:
          E2E_HEADLESS: "true"
          E2E_BROWSER: ${{ matrix.browser }}
        run: |
          export PATH="$PATH:$HOME/.dotnet/tools"
          CMD="dotnet test --project Tests/Presentation/MMCA.Common.UI.E2E.Tests/MMCA.Common.UI.E2E.Tests.csproj -c Release --no-build -- --minimum-expected-tests 1"
          if [ "${{ matrix.browser }}" = "chromium" ]; then
            dotnet-coverage collect -f cobertura -o coverage.e2e.cobertura.xml "$CMD"
          else
            eval "$CMD"
          fi

      - name: Upload coverage (E2E)
        if: ${{ always() && matrix.browser == 'chromium' }}
        uses: actions/upload-artifact@v7
        with:
          name: coverage-e2e
          path: coverage.e2e.cobertura.xml
          if-no-files-found: ignore

      - name: Upload Playwright traces on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: ui-e2e-traces-${{ matrix.browser }}
          path: Tests/Presentation/MMCA.Common.UI.E2E.Tests/bin/Release/net10.0/playwright-traces/**
          if-no-files-found: ignore

  # Performance smoke (§12): build + run the BenchmarkDotNet harness with the Dry job (one invocation per
  # benchmark — seconds, not the full multi-iteration timing run) on every push, so the benchmarked hot
  # paths (Specification compiled-expression cache + criteria composition) are exercised by CI. This is a
  # *runs-clean* gate — it fails the build if a benchmarked code path throws or no longer compiles, NOT a
  # latency-regression gate (full timing runs stay on-demand; see CLAUDE.md and the published COST guide). Kept OUT of
  # MMCA.Common.slnx (like ui-e2e) so the unit `dotnet test --solution` run stays fast.
  performance-smoke:
    name: Performance gate (BenchmarkDotNet Short + baseline verify)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0 # MinVer (on the referenced Source projects) needs full history

      - uses: actions/setup-dotnet@v6
        with:
          dotnet-version: '10.0.x'

      - name: Run hot-path benchmarks (Short job, JSON export)
        # The Benchmarks project references MMCA.Common source directly (no GitHub Packages token needed),
        # like the UI E2E project. --filter "*" selects every benchmark non-interactively (without it BDN
        # prompts for a selection and would hang in CI); --job Short (3 warmup + 3 iterations) gives real
        # measurements in under a minute. --no-launch-profile keeps it deterministic on hosted runners.
        run: dotnet run -c Release --project Tests/Performance/MMCA.Common.Benchmarks --no-launch-profile -- --filter "*" --job Short --exporters json

      - name: Verify against committed perf baseline (rubric section 12)
        # Latency-regression gate, not just runs-clean: build/perfgate compares the BDN results against
        # Tests/Performance/perf-baseline.json (deterministic allocation ceilings + machine-independent
        # ratio floors such as the compiled-expression cache staying >= 1000x ahead of the recompile
        # anti-pattern) and fails the job on any violation. Moving the numbers deliberately means
        # updating the baseline file in the same PR.
        run: dotnet run --project build/perfgate -- BenchmarkDotNet.Artifacts/results Tests/Performance/perf-baseline.json

  # Merge the unit/architecture/bUnit + E2E coverage tiers into one report, publish it to the run
  # summary, and enforce a coverage FLOOR as a regression backstop (see "Enforce coverage floor").
  # Runs after both test jobs regardless of their outcome.
  coverage:
    needs: [build-and-test, ui-e2e]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - uses: actions/setup-dotnet@v6
        with:
          dotnet-version: '10.0.x'

      - name: Download coverage artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: coverage-*
          path: coverage
          merge-multiple: true

      - name: Generate merged coverage report
        run: |
          dotnet tool install --global dotnet-reportgenerator-globaltool
          export PATH="$PATH:$HOME/.dotnet/tools"
          reportgenerator \
            -reports:'coverage/**/*.cobertura.xml' \
            -targetdir:coverage-report \
            -reporttypes:'Html;TextSummary;MarkdownSummaryGithub' \
            -assemblyfilters:'+MMCA.*;-*.Tests' \
            -filefilters:'-**/*.generated.cs;-**/*.g.cs'
          echo "## Test coverage (unit + bUnit + E2E)" >> "$GITHUB_STEP_SUMMARY"
          cat coverage-report/SummaryGithub.md >> "$GITHUB_STEP_SUMMARY"
          cat coverage-report/Summary.txt

      - name: Upload HTML coverage report
        uses: actions/upload-artifact@v7
        with:
          name: coverage-report-html
          path: coverage-report
          if-no-files-found: warn

      # Coverage floor (§14): a regression backstop gating the UNIT/arch/bUnit tier, with GENERATED code
      # excluded (*.generated.cs / *.g.cs) — source generators (e.g. Microsoft.AspNetCore.OpenApi) emit
      # large uncovered files that otherwise tank the number (raw 45.3% vs hand-written 61.9% on
      # 2026-06-19). We gate the unit tier, not the merged report (the gallery E2E tier dilutes it). 68.3%
      # sits 2 points below the 70.3% measured after the 2026-07 coverage program (session auth, broker
      # bus, Grpc/OAuth/JWKS, UI services); ratchet up as it grows. Parsing uses sed (locale-robust).
      - name: Enforce coverage floor (unit/arch/bUnit tier, generated code excluded)
        # Only enforce when build-and-test succeeded (so the unit coverage artifact exists); an upstream
        # failure shouldn't add a confusing secondary coverage failure.
        if: success() && needs.build-and-test.result == 'success'
        run: |
          unit="coverage/coverage.unit.cobertura.xml"
          test -f "$unit" || { echo "::error::unit coverage report not found ($unit)"; exit 1; }
          export PATH="$PATH:$HOME/.dotnet/tools"
          reportgenerator -reports:"$unit" -targetdir:coverage-unit-report -reporttypes:TextSummary -assemblyfilters:'+MMCA.*;-*.Tests' -filefilters:'-**/*.generated.cs;-**/*.g.cs'
          line=$(sed -n 's/.*Line coverage:[[:space:]]*\([0-9.]*\)%.*/\1/p' coverage-unit-report/Summary.txt | head -1)
          test -n "$line" || { echo "::error::could not parse unit line coverage"; exit 1; }
          awk -v l="$line" -v m="68.3" 'BEGIN{ if (l+0 < m+0) { printf("::error::Unit line coverage %.1f%% is below the %.1f%% floor\n", l, m); exit 1 } printf("Unit line coverage %.1f%% meets the %.1f%% floor\n", l, m) }'

  # Cross-repo pre-merge canary: build a real consumer (MMCA.Helpdesk) against THIS PR's framework
  # source, so a breaking public-API change fails here instead of surfacing only after a release +
  # lockstep sweep. Helpdesk is the ideal canary: minimal single-module app, no database and no
  # GitHub Packages token to build (it ships a committed local.props that swaps the MMCA.Common.*
  # PackageReferences for ProjectReferences into ../MMCA.Common/Source via UseLocalMMCA). The two
  # repos are checked out as siblings so Helpdesk's local.props path (..\MMCA.Common\Source)
  # resolves to this PR's checkout. Promoted to a required merge gate 2026-07-16 after 9
  # consecutive green runs since introduction (2026-07-14); its context is in branch protection.
  consumer-source-build:
    name: Consumer source build (Helpdesk)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout MMCA.Common (this PR)
        uses: actions/checkout@v7
        with:
          path: MMCA.Common
          fetch-depth: 0 # MinVer needs full history

      - name: Checkout MMCA.Helpdesk (consumer canary)
        uses: actions/checkout@v7
        with:
          repository: ivanball/MMCA.Helpdesk
          ref: main
          path: MMCA.Helpdesk
          fetch-depth: 0
          # Public repo builds with the default token; if Helpdesk is private, set a
          # CONSUMER_CANARY_PAT secret with contents:read on it.
          token: ${{ secrets.CONSUMER_CANARY_PAT || github.token }}

      - uses: actions/setup-dotnet@v6
        with:
          dotnet-version: '10.0.x'

      - name: Build Helpdesk against Common source (UseLocalMMCA)
        working-directory: MMCA.Helpdesk
        # Helpdesk's committed local.props already sets UseLocalMMCA=true and points at the sibling
        # ../MMCA.Common/Source, so this compiles the reference app against the PR's framework source.
        run: dotnet build MMCA.Helpdesk.slnx -c Release

      - name: Test Helpdesk (domain + architecture, no DB)
        working-directory: MMCA.Helpdesk
        # Helpdesk's suite is ~44 tests; floor at 40 so a discovery/filter regression fails
        # instead of passing green with near-zero tests discovered.
        run: dotnet test --solution MMCA.Helpdesk.slnx -c Release --no-build --minimum-expected-tests 40

  # Package-mode consumption canary: pack every slnx package into a local folder feed, then
  # restore + build a minimal throwaway consumer against those nupkgs. Catches pack breaks (NU5xxx)
  # and package-mode-only restore/analyzer/reference failures BEFORE a release: source-mode builds
  # (local.props, and the consumer-source-build job above) bind ProjectReferences, so this failure
  # mode has shipped twice without CI seeing it. MinVer is skipped with an explicit CI-only version
  # (the same mechanism release.yml uses), so the consumer can pin the packed version exactly; its
  # nuget.config maps MMCA.Common.* to the local feed and everything else to nuget.org. The
  # throwaway consumer lives in RUNNER_TEMP, outside the repo checkout, so it does NOT inherit
  # Directory.Build.props/Directory.Packages.props — it consumes the packages the way a real
  # downstream app does. Runs parallel to build-and-test, not behind it.
  package-consumption:
    name: Package-mode consumer (pack + local feed)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      PACK_VERSION: 0.0.1-ci.${{ github.run_number }}
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0 # MinVer needs full history (MinVerSkip pins the version, but keep parity)

      - uses: actions/setup-dotnet@v6
        with:
          dotnet-version: '10.0.x'

      - name: Pack all packages to a local folder feed
        run: dotnet pack MMCA.Common.slnx -c Release -o ./nupkgs -p:MinVerSkip=true -p:Version=$PACK_VERSION -p:PackageVersion=$PACK_VERSION

      - name: Scaffold throwaway package consumer
        # A classlib referencing the meta set (API + Infrastructure + Testing.Architecture) pulls
        # the full package graph transitively; the smoke type proves the refs actually bind.
        run: |
          mkdir -p "$RUNNER_TEMP/pkg-consumer"
          cd "$RUNNER_TEMP/pkg-consumer"
          cat > nuget.config <<EOF
          <?xml version="1.0" encoding="utf-8"?>
          <configuration>
            <packageSources>
              <clear />
              <add key="local-nupkgs" value="$GITHUB_WORKSPACE/nupkgs" />
              <add key="nuget.org" value="https://api.nuget.org/v3/index.json" />
            </packageSources>
            <packageSourceMapping>
              <packageSource key="local-nupkgs">
                <package pattern="MMCA.Common.*" />
              </packageSource>
              <packageSource key="nuget.org">
                <package pattern="*" />
              </packageSource>
            </packageSourceMapping>
          </configuration>
          EOF
          cat > Consumer.csproj <<EOF
          <Project Sdk="Microsoft.NET.Sdk">
            <PropertyGroup>
              <TargetFramework>net10.0</TargetFramework>
              <Nullable>enable</Nullable>
              <ImplicitUsings>enable</ImplicitUsings>
            </PropertyGroup>
            <ItemGroup>
              <PackageReference Include="MMCA.Common.API" Version="$PACK_VERSION" />
              <PackageReference Include="MMCA.Common.Infrastructure" Version="$PACK_VERSION" />
              <PackageReference Include="MMCA.Common.Testing.Architecture" Version="$PACK_VERSION" />
            </ItemGroup>
          </Project>
          EOF
          cat > Smoke.cs <<'EOF'
          using MMCA.Common.Shared.Abstractions;

          namespace PackageConsumer;

          public static class Smoke
          {
              public static Result Ok() => Result.Success();
          }
          EOF

      - name: Restore and build consumer against the packed nupkgs
        working-directory: ${{ runner.temp }}/pkg-consumer
        run: dotnet build Consumer.csproj -c Release

  # Reference-deployment validation gate (§17): the samples/deployment Bicep is the framework's
  # distilled IaC/OIDC reference (a library cannot deploy itself; DEPLOYMENT.md), so keep it
  # continuously compilable instead of trusting it not to rot. `az bicep build` type-checks both
  # templates (declarations, resource API versions, param wiring) with no cloud credentials and
  # fails the job on any error; warnings surface in the log. A real what-if/deploy stays a
  # consumer-side concern (ADC/Store deploy.yml are the production-proven versions).
  sample-deployment-validate:
    name: Validate samples/deployment Bicep
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7

      - name: Compile foundation.bicep
        run: az bicep build --file samples/deployment/foundation.bicep --stdout > /dev/null

      - name: Compile main.bicep
        run: az bicep build --file samples/deployment/main.bicep --stdout > /dev/null
