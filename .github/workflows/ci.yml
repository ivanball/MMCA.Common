name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0 # MinVer needs full history

      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore MMCA.Common.slnx

      - name: Build
        run: dotnet build MMCA.Common.slnx -c Release --no-restore

      - name: Test
        run: dotnet test --solution MMCA.Common.slnx -c Release --no-build --minimum-expected-tests 1
