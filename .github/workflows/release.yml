name: Release NuGet Packages

on:
  push:
    tags: ['v*']

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      packages: write
      contents: read
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0 # MinVer needs full history

      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore MMCA.Common.slnx

      - name: Determine version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Build
        run: dotnet build MMCA.Common.slnx -c Release --no-restore -p:MinVerSkip=true -p:Version=${{ steps.version.outputs.VERSION }}

      - name: Test
        run: dotnet test --solution MMCA.Common.slnx -c Release --no-build

      - name: Pack
        run: dotnet pack MMCA.Common.slnx -c Release --no-build -o ./nupkgs -p:MinVerSkip=true -p:PackageVersion=${{ steps.version.outputs.VERSION }}

      # Software Bill of Materials for the released packages (CycloneDX).
      # Hard gate (R29 §32): every published version must ship a verifiable SBOM, so a failed
      # generation OR an empty/missing artifact fails the release (was continue-on-error while the
      # tooling was being validated in CI — now promoted to a blocking step).
      - name: Generate SBOM (CycloneDX)
        run: |
          dotnet tool install --global CycloneDX
          dotnet CycloneDX MMCA.Common.slnx --output ./sbom --json
          ls -la ./sbom
          test -n "$(ls -A ./sbom 2>/dev/null)" || { echo "::error::SBOM generation produced no output"; exit 1; }

      - name: Upload SBOM
        uses: actions/upload-artifact@v4
        with:
          name: sbom
          path: ./sbom
          if-no-files-found: error

      - name: Push to GitHub Packages
        run: dotnet nuget push ./nupkgs/*.nupkg --source "https://nuget.pkg.github.com/ivanball/index.json" --api-key ${{ secrets.GITHUB_TOKEN }} --skip-duplicate
